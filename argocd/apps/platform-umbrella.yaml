## ============================================================
## Single ArgoCD Application — Platform Umbrella Chart
##
## This one Application deploys ALL 8 platform components
## via the Helm umbrella chart at charts/platform-umbrella/.
##
## Apply:  kubectl apply -f argocd/apps/platform-umbrella.yaml
## ============================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-umbrella
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: platform
spec:
  project: platform

  source:
    repoURL: https://github.com/vishalliverpool/Umbrella-arogocd-deployment.git
    targetRevision: HEAD
    path: charts/platform-umbrella

    helm:
      releaseName: platform
      ## Drop per-environment overrides here or use --values flag
      # valueFiles:
      #   - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: platform   # All 8 components land in this namespace

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # Needed for kube-prometheus-stack CRDs
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  ## Health checks — ArgoCD will wait for each component to be healthy
  ignoreDifferences:
    ## kube-prometheus-stack mutates these on admission
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/spec/containers/0/resources
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks/0/failurePolicy
