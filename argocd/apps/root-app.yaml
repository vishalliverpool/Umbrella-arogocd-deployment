## Root Application — App of Apps
## Watches argocd/apps/platform/ and syncs every Application manifest there.
## Apply once:  kubectl apply -f argocd/apps/root-app.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform

  source:
    repoURL: https://github.com/vishalliverpool/Umbrella-arogocd-deployment.git
    targetRevision: HEAD
    path: argocd/apps/platform

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
