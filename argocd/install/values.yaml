## ArgoCD Helm values — exposes server as AWS NLB LoadBalancer

global:
  image:
    tag: ""   # Picks chart appVersion by default

configs:
  params:
    server.insecure: "true"   # TLS terminated at LB; flip to false + add cert for prod
  cm:
    application.resourceTrackingMethod: annotation

server:
  replicas: 2

  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "external"
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

repoServer:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  volumes:
    - name: helmfile-cmp-cm
      configMap:
        name: helmfile-cmp-cm
    - name: custom-tools
      emptyDir: {}

  # Copies argocd-cmp-server binary from the ArgoCD image into the sidecar.
  # Keep this image tag in sync with the installed ArgoCD chart appVersion.
  initContainers:
    - name: copy-cmp-server
      image: quay.io/argoproj/argocd:v2.13.4
      command: [cp, /usr/local/bin/argocd-cmp-server, /custom-tools/argocd-cmp-server]
      volumeMounts:
        - name: custom-tools
          mountPath: /custom-tools

  extraContainers:
    - name: helmfile-plugin
      image: ghcr.io/helmfile/helmfile:v0.167.1
      command: [/custom-tools/argocd-cmp-server]
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      env:
        - name: HELM_CACHE_HOME
          value: /helm-working-dir
        - name: HELM_CONFIG_HOME
          value: /helm-working-dir
        - name: HELM_DATA_HOME
          value: /helm-working-dir
      volumeMounts:
        - name: custom-tools
          mountPath: /custom-tools
        - name: var-files
          mountPath: /var/run/argocd
        - name: plugins
          mountPath: /home/argocd/cmp-server/plugins
        - name: tmp
          mountPath: /tmp
        - name: helm-working-dir
          mountPath: /helm-working-dir
        - name: helmfile-cmp-cm
          mountPath: /home/argocd/cmp-server/config/plugin.yaml
          subPath: plugin.yaml

applicationSet:
  replicas: 2

redis:
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
