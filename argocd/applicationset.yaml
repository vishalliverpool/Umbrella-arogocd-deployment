apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: sinec-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    # Each services/<svc>/config.yaml file produces one ArgoCD Application.
    # Adding a new service = drop a config.yaml in services/<name>/ and push.
    - git:
        repoURL: https://github.com/vishalliverpool/Umbrella-arogocd-deployment.git
        revision: main
        files:
          - path: services/*/config.yaml
  template:
    metadata:
      name: '{{.service}}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        # ArgoCD pulls the chart directly from ECR OCI — no chart files in git.
        repoURL: oci://218804696766.dkr.ecr.us-east-1.amazonaws.com/charts
        chart: '{{.service}}'
        targetRevision: '{{.version}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: sinec-app
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
