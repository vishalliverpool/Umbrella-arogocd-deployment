grafana:
  replicas: 1
  adminUser: admin
  adminPassword: "cjbsOWbhOBpQSgTtgcjs"
  persistence:
    enabled: true
    storageClassName: gp2
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-operated.monitoring.svc.cluster.local:9090
          access: proxy
          isDefault: true
          jsonData:
            timeInterval: "30s"
        - name: Loki
          type: loki
          url: http://loki.logging.svc.cluster.local:3100
          access: proxy
          jsonData:
            maxLines: 1000
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: platform
          orgId: 1
          folder: Platform
          type: file
          disableDeletion: true
          options:
            path: /var/lib/grafana/dashboards/platform
  dashboards:
    platform:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      nginx-ingress:
        gnetId: 9614
        revision: 1
        datasource: Prometheus
      cert-manager:
        gnetId: 11001
        revision: 1
        datasource: Prometheus
      loki-explorer:
        gnetId: 13639
        revision: 2
        datasource: Loki
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
  serviceMonitor:
    enabled: true
