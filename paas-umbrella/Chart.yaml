apiVersion: v2
name: platform
description: Platform infrastructure — all 8 components from upstream repos
type: application
version: 0.1.0
dependencies:
  - name: ingress-nginx
    version: "4.10.1"
    repository: https://kubernetes.github.io/ingress-nginx
  - name: cert-manager
    version: "1.14.5"
    repository: https://charts.jetstack.io
  - name: metrics-server
    version: "3.12.1"
    repository: https://kubernetes-sigs.github.io/metrics-server/
  - name: kube-prometheus-stack
    version: "58.5.3"
    repository: https://prometheus-community.github.io/helm-charts
  - name: loki
    version: "5.47.2"
    repository: https://grafana.github.io/helm-charts
  - name: grafana
    version: "7.3.11"
    repository: https://grafana.github.io/helm-charts
  - name: promtail
    version: "6.15.5"
    repository: https://grafana.github.io/helm-charts
  - name: external-dns
    version: "1.14.5"
    repository: https://kubernetes-sigs.github.io/external-dns/
