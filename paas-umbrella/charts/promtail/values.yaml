promtail:
  config:
    clients:
      - url: http://loki.logging.svc.cluster.local:3100/loki/api/v1/push
    snippets:
      pipelineStages: [{cri: {}}]
      scrapeConfigs: |
        - job_name: kubernetes-pods
          pipeline_stages: [{cri: {}}]
          kubernetes_sd_configs: [{role: pod}]
          relabel_configs:
            - {source_labels: [__meta_kubernetes_pod_node_name], target_label: __host__}
            - {action: labelmap, regex: __meta_kubernetes_pod_label_(.+)}
            - {action: replace, replacement: "$1", separator: "/", source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_pod_name], target_label: job}
            - {action: replace, source_labels: [__meta_kubernetes_namespace], target_label: namespace}
            - {action: replace, source_labels: [__meta_kubernetes_pod_name], target_label: pod}
            - {action: replace, source_labels: [__meta_kubernetes_pod_container_name], target_label: container}
            - {replacement: /var/log/pods/*$1/*.log, separator: "/", source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name], target_label: __path__}
  resources: {requests: {cpu: 50m, memory: 64Mi}, limits: {cpu: 200m, memory: 128Mi}}
