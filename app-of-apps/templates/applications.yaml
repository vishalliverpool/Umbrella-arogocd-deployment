{{- range .Values.apps }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .name }}
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: paas-infra
  source:
    {{- if .path }}
    repoURL: {{ $.Values.repoURL }}
    targetRevision: {{ $.Values.targetRevision | default "HEAD" }}
    path: {{ .path }}
    {{- else }}
    repoURL: {{ .repo }}
    targetRevision: {{ .version }}
    chart: {{ .chart }}
    helm:
      releaseName: {{ .name }}
      {{- with .values }}
      valuesObject:
{{ toYaml . | indent 8 }}
      {{- end }}
    {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
{{- end }}
