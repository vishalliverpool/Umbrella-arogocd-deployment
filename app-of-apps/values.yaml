# App-of-Apps — each entry becomes a child ArgoCD Application.
# `values` is passed straight to the upstream chart (no chart-name nesting,
# since each child Application deploys the upstream chart directly).
#
# Two source styles per app:
#   - upstream Helm chart: set repo + chart + version (+ optional values)
#   - local git manifests: set path (sourced from repoURL below)

# Git repo for local-path apps (e.g. cluster-issuers)
repoURL: https://github.com/vishalliverpool/Umbrella-arogocd-deployment.git
targetRevision: HEAD

apps:
  # ── Microservices only (OCI Helm charts in Amazon ECR) ─────────────────────
  # Each service is an independent app deployed to the 'microservices' namespace.
  # Click each in ArgoCD UI to expand and see Deployment, Service, etc.
  # Auth: handled by the ecr-charts-creds repo-creds secret (see ecr-credentials/).
  - name: orders
    namespace: microservices
    chart: orders
    version: "1.0.0"
    repo: 218804696766.dkr.ecr.us-east-1.amazonaws.com/charts

  - name: users
    namespace: microservices
    chart: users
    version: "1.0.0"
    repo: 218804696766.dkr.ecr.us-east-1.amazonaws.com/charts

  - name: payments
    namespace: microservices
    chart: payments
    version: "1.0.0"
    repo: 218804696766.dkr.ecr.us-east-1.amazonaws.com/charts
