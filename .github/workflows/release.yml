name: release

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  REGISTRY: 218804696766.dkr.ecr.us-east-1.amazonaws.com
  CLUSTER_NAME: platform-cluster
  RELEASE_NAME: sinec-platform
  NAMESPACE: sinec-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::218804696766:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Helm login to ECR (for OCI sub-chart deps)
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
            helm registry login --username AWS --password-stdin "$REGISTRY"

      - name: Resolve sub-chart dependencies
        run: helm dependency update umbrella/

      - name: Configure kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name "$CLUSTER_NAME" \
            --region "$AWS_REGION"

      - name: Helm deploy to EKS
        run: |
          helm upgrade --install "$RELEASE_NAME" umbrella/ \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --values umbrella/values.yaml \
            --wait \
            --timeout 5m
