name: deploy

# Per-service, per-environment GitOps deploy.
# A service pipeline bumps environments/<env>/<service>.yaml and pushes here.
# detect → resolves which services changed in each env; then THREE separate
# jobs (deploy-dev / deploy-qa / deploy-prod) roll those services out, so each
# environment is tracked independently and gated by its own GitHub Environment.
on:
  push:
    branches: [main]
    paths:
      - "environments/**"
      - "charts/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to (re)deploy"
        required: true
        type: choice
        options: [dev, qa, prod]
      service:
        description: "Service to (re)deploy"
        required: true
        type: choice
        options: [orders, users, payments]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: platform-cluster
  DEPLOY_ROLE: arn:aws:iam::218804696766:role/github-actions-deploy

jobs:
  # ── Resolve which services changed, per environment ──────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      dev_services:  ${{ steps.changes.outputs.dev_services }}
      qa_services:   ${{ steps.changes.outputs.qa_services }}
      prod_services: ${{ steps.changes.outputs.prod_services }}
      has_dev:  ${{ steps.changes.outputs.has_dev }}
      has_qa:   ${{ steps.changes.outputs.has_qa }}
      has_prod: ${{ steps.changes.outputs.has_prod }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: changes
        run: |
          set -euo pipefail
          ENVS="dev qa prod"
          for e in $ENVS; do : > "/tmp/$e.list"; done

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "${{ inputs.service }}" >> "/tmp/${{ inputs.environment }}.list"
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              BEFORE="$(git rev-parse HEAD^ 2>/dev/null || echo '')"
            fi
            if [ -n "$BEFORE" ]; then
              FILES="$(git diff --name-only "$BEFORE" HEAD -- environments/ charts/)"
            else
              FILES="$(git ls-files environments/ charts/)"
            fi

            while IFS= read -r f; do
              [ -z "$f" ] && continue
              case "$f" in
                environments/*/*.yaml)
                  E="$(echo "$f" | cut -d/ -f2)"
                  S="$(echo "$f" | cut -d/ -f3 | sed 's/\.yaml$//')"
                  echo "$S" >> "/tmp/$E.list"
                  ;;
                charts/*/*)
                  # a chart change redeploys that service to every environment
                  S="$(echo "$f" | cut -d/ -f2)"
                  for E in $ENVS; do echo "$S" >> "/tmp/$E.list"; done
                  ;;
              esac
            done <<< "$FILES"
          fi

          for e in $ENVS; do
            ARR="$(sort -u "/tmp/$e.list" | sed '/^$/d' | jq -R . | jq -s -c .)"
            echo "${e}_services=${ARR}" >> "$GITHUB_OUTPUT"
            if [ "$ARR" = "[]" ]; then
              echo "has_${e}=false" >> "$GITHUB_OUTPUT"
            else
              echo "has_${e}=true" >> "$GITHUB_OUTPUT"
            fi
            echo "${e}: ${ARR}"
          done

  # ── DEV ──────────────────────────────────────────────────────────────────────
  deploy-dev:
    needs: detect
    if: needs.detect.outputs.has_dev == 'true'
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect.outputs.dev_services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"
      - name: Ensure namespace
        run: kubectl get ns dev >/dev/null 2>&1 || kubectl create ns dev
      - name: Helm upgrade --install (${{ matrix.service }} → dev)
        run: |
          helm upgrade --install "${{ matrix.service }}" "charts/${{ matrix.service }}" \
            --namespace dev \
            --values "environments/dev/${{ matrix.service }}.yaml" \
            --wait --timeout 5m
      - name: Verify rollout
        run: |
          kubectl rollout status "deployment/${{ matrix.service }}" --namespace dev --timeout 300s
          kubectl get pods -n dev -l app=${{ matrix.service }}

  # ── QA ───────────────────────────────────────────────────────────────────────
  deploy-qa:
    needs: detect
    if: needs.detect.outputs.has_qa == 'true'
    runs-on: ubuntu-latest
    environment: qa
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect.outputs.qa_services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"
      - name: Ensure namespace
        run: kubectl get ns qa >/dev/null 2>&1 || kubectl create ns qa
      - name: Helm upgrade --install (${{ matrix.service }} → qa)
        run: |
          helm upgrade --install "${{ matrix.service }}" "charts/${{ matrix.service }}" \
            --namespace qa \
            --values "environments/qa/${{ matrix.service }}.yaml" \
            --wait --timeout 5m
      - name: Verify rollout
        run: |
          kubectl rollout status "deployment/${{ matrix.service }}" --namespace qa --timeout 300s
          kubectl get pods -n qa -l app=${{ matrix.service }}

  # ── PROD ─────────────────────────────────────────────────────────────────────
  deploy-prod:
    needs: detect
    if: needs.detect.outputs.has_prod == 'true'
    runs-on: ubuntu-latest
    environment: prod
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect.outputs.prod_services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"
      - name: Ensure namespace
        run: kubectl get ns prod >/dev/null 2>&1 || kubectl create ns prod
      - name: Helm upgrade --install (${{ matrix.service }} → prod)
        run: |
          helm upgrade --install "${{ matrix.service }}" "charts/${{ matrix.service }}" \
            --namespace prod \
            --values "environments/prod/${{ matrix.service }}.yaml" \
            --wait --timeout 5m
      - name: Verify rollout
        run: |
          kubectl rollout status "deployment/${{ matrix.service }}" --namespace prod --timeout 300s
          kubectl get pods -n prod -l app=${{ matrix.service }}
