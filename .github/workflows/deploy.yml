name: deploy

# GitOps deploy — the per-env values files are the source of truth.
#
#   service build.yml   → bumps services/<svc>/dev.yaml   (image tag = <sha>)
#   service release.yml → bumps services/<svc>/qa.yaml or prod.yaml (rc / release tag)
#
# On push, deploys ONLY the changed <service>→<env> pairs — one team's release
# never touches another service or environment. Tag deployed = what's in the values
# file (no --set overrides). Roll back by reverting the bump commit.
#
# Three separate jobs keep each environment tracked independently, gated by its
# own GitHub Environment (set required reviewers on qa + prod; dev auto-deploys).
on:
  push:
    branches: [main]
    paths:
      - "services/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to (re)deploy"
        required: true
        type: choice
        options: [dev, qa, prod]
      service:
        description: "Service to (re)deploy (or 'all')"
        required: true
        type: choice
        options: [all, orders, users, payments]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: platform-cluster
  DEPLOY_ROLE: arn:aws:iam::218804696766:role/github-actions-deploy

jobs:
  # ── Resolve which services changed, per environment ──────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      dev_services:  ${{ steps.changes.outputs.dev_services }}
      qa_services:   ${{ steps.changes.outputs.qa_services }}
      prod_services: ${{ steps.changes.outputs.prod_services }}
      has_dev:  ${{ steps.changes.outputs.has_dev }}
      has_qa:   ${{ steps.changes.outputs.has_qa }}
      has_prod: ${{ steps.changes.outputs.has_prod }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: changes
        run: |
          set -euo pipefail
          ENVS="dev qa prod"
          for e in $ENVS; do : > "/tmp/$e.list"; done

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
            if [ "${{ inputs.service }}" = "all" ]; then
              for d in services/*/; do
                svc="$(basename "$d")"
                [ -f "services/$svc/$ENV.yaml" ] && echo "$svc" >> "/tmp/$ENV.list"
              done
            else
              echo "${{ inputs.service }}" >> "/tmp/$ENV.list"
            fi
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              BEFORE="$(git rev-parse HEAD^ 2>/dev/null || echo '')"
            fi
            if [ -n "$BEFORE" ]; then
              FILES="$(git diff --name-only "$BEFORE" HEAD -- services/)"
            else
              FILES="$(git ls-files services/)"
            fi

            while IFS= read -r f; do
              [ -z "$f" ] && continue
              # services/<svc>/dev.yaml  → dev, <svc>
              # services/<svc>/qa.yaml   → qa,  <svc>
              # services/<svc>/prod.yaml → prod, <svc>
              # services/<svc>/chart/**  → all envs, <svc>
              case "$f" in
                services/*/dev.yaml|services/*/qa.yaml|services/*/prod.yaml)
                  S="$(echo "$f" | cut -d/ -f2)"
                  E="$(basename "$f" .yaml)"
                  echo "$S" >> "/tmp/$E.list"
                  ;;
                services/*/chart/*)
                  S="$(echo "$f" | cut -d/ -f2)"
                  for E in $ENVS; do echo "$S" >> "/tmp/$E.list"; done
                  ;;
              esac
            done <<< "$FILES"
          fi

          for e in $ENVS; do
            ARR="$(sort -u "/tmp/$e.list" | sed '/^$/d' | jq -R . | jq -s -c .)"
            echo "${e}_services=${ARR}" >> "$GITHUB_OUTPUT"
            if [ "$ARR" = "[]" ]; then
              echo "has_${e}=false" >> "$GITHUB_OUTPUT"
            else
              echo "has_${e}=true" >> "$GITHUB_OUTPUT"
            fi
            echo "${e}: ${ARR}"
          done

  # ── DEV (auto) ───────────────────────────────────────────────────────────────
  deploy-dev:
    needs: detect
    if: needs.detect.outputs.has_dev == 'true'
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect.outputs.dev_services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"
      - name: Ensure namespace
        run: kubectl get ns dev >/dev/null 2>&1 || kubectl create ns dev
      - name: Deploy ${{ matrix.service }} → dev
        run: |
          helm upgrade --install "${{ matrix.service }}" \
            "services/${{ matrix.service }}/chart" \
            --namespace dev \
            --values "services/${{ matrix.service }}/dev.yaml" \
            --wait --timeout 5m
      - name: Verify rollout
        run: |
          kubectl rollout status "deployment/${{ matrix.service }}" --namespace dev --timeout 300s
          kubectl get pods -n dev -l "app=${{ matrix.service }}"

  # ── QA (gated by 'qa' environment) ───────────────────────────────────────────
  deploy-qa:
    needs: detect
    if: needs.detect.outputs.has_qa == 'true'
    runs-on: ubuntu-latest
    environment: qa
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect.outputs.qa_services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"
      - name: Ensure namespace
        run: kubectl get ns qa >/dev/null 2>&1 || kubectl create ns qa
      - name: Deploy ${{ matrix.service }} → qa
        run: |
          helm upgrade --install "${{ matrix.service }}" \
            "services/${{ matrix.service }}/chart" \
            --namespace qa \
            --values "services/${{ matrix.service }}/qa.yaml" \
            --wait --timeout 5m
      - name: Verify rollout
        run: |
          kubectl rollout status "deployment/${{ matrix.service }}" --namespace qa --timeout 300s
          kubectl get pods -n qa -l "app=${{ matrix.service }}"

  # ── PROD (gated by 'prod' environment) ───────────────────────────────────────
  deploy-prod:
    needs: detect
    if: needs.detect.outputs.has_prod == 'true'
    runs-on: ubuntu-latest
    environment: prod
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect.outputs.prod_services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"
      - name: Ensure namespace
        run: kubectl get ns prod >/dev/null 2>&1 || kubectl create ns prod
      - name: Deploy ${{ matrix.service }} → prod
        run: |
          helm upgrade --install "${{ matrix.service }}" \
            "services/${{ matrix.service }}/chart" \
            --namespace prod \
            --values "services/${{ matrix.service }}/prod.yaml" \
            --wait --timeout 5m
      - name: Verify rollout
        run: |
          kubectl rollout status "deployment/${{ matrix.service }}" --namespace prod --timeout 300s
          kubectl get pods -n prod -l "app=${{ matrix.service }}"
