name: deploy

# DEV  : workflow_dispatch (environment=dev) triggered by build.yml via API dispatch.
#        SHA passed as image_tag input — no gitops commits for dev.
# QA   : push tag  qa-v*   to this repo  (e.g. qa-v1.0.0-rc.1)
#        qa.yaml already bumped by release.yml in the service repo.
# PROD : push tag  prod-v* to this repo  (e.g. prod-v1.0.0)
#        prod.yaml already bumped by release.yml in the service repo.
#
# Commits to main (qa.yaml / prod.yaml bumps from release.yml) never trigger a deploy.

on:
  push:
    tags:
      - "qa-v*"
      - "prod-v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options: [dev, qa, prod]
      service:
        description: "Service to deploy (all = every service)"
        required: true
        type: choice
        options: [all, orders, users, payments]
      image_tag:
        description: "Image tag — dev only (SHA from build.yml)"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: platform-cluster
  DEPLOY_ROLE: arn:aws:iam::218804696766:role/github-actions-deploy

jobs:
  # ── Resolve environment + services list ──────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      services:    ${{ steps.resolve.outputs.services }}
    steps:
      - id: resolve
        run: |
          set -euo pipefail
          ALL='["orders","users","payments"]'

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG" == qa-v* ]]; then
              ENV="qa"
            elif [[ "$TAG" == prod-v* ]]; then
              ENV="prod"
            else
              echo "::error::Unrecognised tag prefix: ${TAG}"
              exit 1
            fi
            SERVICES="$ALL"
          else
            ENV="${{ inputs.environment }}"
            if [ "${{ inputs.service }}" = "all" ]; then
              SERVICES="$ALL"
            else
              SERVICES='["${{ inputs.service }}"]'
            fi
          fi

          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"
          echo "services=${SERVICES}"  >> "$GITHUB_OUTPUT"
          echo "Resolved: env=${ENV}, services=${SERVICES}"

  # ── DEV ──────────────────────────────────────────────────────────────────────
  deploy-dev:
    needs: setup
    if: needs.setup.outputs.environment == 'dev'
    runs-on: ubuntu-latest
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.setup.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve image tag
        id: tag
        run: |
          IMAGE_TAG="${{ inputs.image_tag }}"
          if [ -z "$IMAGE_TAG" ]; then
            IMAGE_TAG=$(aws ecr describe-images \
              --repository-name "${{ matrix.service }}" \
              --region "$AWS_REGION" \
              --query 'sort_by(imageDetails,&imagePushedAt)[-1].imageTags[0]' \
              --output text)
            echo "No image_tag input — resolved from ECR: $IMAGE_TAG"
          fi
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"

      - name: Ensure namespace
        run: kubectl get ns dev >/dev/null 2>&1 || kubectl create ns dev

      - name: Deploy ${{ matrix.service }} → dev
        run: |
          helm upgrade --install "${{ matrix.service }}" \
            "services/${{ matrix.service }}/chart" \
            --namespace dev \
            --values "services/${{ matrix.service }}/dev.yaml" \
            --set image.tag="${{ steps.tag.outputs.tag }}" \
            --wait --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status "deployment/${{ matrix.service }}" --namespace dev --timeout 300s
          kubectl get pods -n dev -l "app=${{ matrix.service }}"

  # ── QA ───────────────────────────────────────────────────────────────────────
  deploy-qa:
    needs: setup
    if: needs.setup.outputs.environment == 'qa'
    runs-on: ubuntu-latest
    environment: qa
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.setup.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"

      - name: Ensure namespace
        run: kubectl get ns qa >/dev/null 2>&1 || kubectl create ns qa

      - name: Deploy ${{ matrix.service }} → qa
        run: |
          helm upgrade --install "${{ matrix.service }}" \
            "services/${{ matrix.service }}/chart" \
            --namespace qa \
            --values "services/${{ matrix.service }}/qa.yaml" \
            --wait --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status "deployment/${{ matrix.service }}" --namespace qa --timeout 300s
          kubectl get pods -n qa -l "app=${{ matrix.service }}"

  # ── PROD ─────────────────────────────────────────────────────────────────────
  deploy-prod:
    needs: setup
    if: needs.setup.outputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.setup.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"

      - name: Ensure namespace
        run: kubectl get ns prod >/dev/null 2>&1 || kubectl create ns prod

      - name: Deploy ${{ matrix.service }} → prod
        run: |
          helm upgrade --install "${{ matrix.service }}" \
            "services/${{ matrix.service }}/chart" \
            --namespace prod \
            --values "services/${{ matrix.service }}/prod.yaml" \
            --wait --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status "deployment/${{ matrix.service }}" --namespace prod --timeout 300s
          kubectl get pods -n prod -l "app=${{ matrix.service }}"
