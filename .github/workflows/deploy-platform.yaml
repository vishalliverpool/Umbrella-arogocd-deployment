name: Deploy Platform to ArgoCD

on:
  push:
    branches: [main]
    paths:
      - "argocd/projects/**"
      - "argocd/apps/**"
      - "charts/**"
  workflow_dispatch:
    inputs:
      force_sync:
        description: "Force ArgoCD hard-refresh after apply"
        type: boolean
        default: false

permissions:
  id-token: write   # OIDC token for AWS role assumption
  contents: read

env:
  CLUSTER_NAME: ${{ vars.CLUSTER_NAME }}
  REGION: ${{ vars.AWS_REGION }}
  ARGOCD_NS: ${{ vars.ARGOCD_NS }}

jobs:
  deploy:
    name: Apply ArgoCD Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── AWS auth via OIDC (no long-lived keys) ─────────────────
      # Secret: AWS_ROLE_ARN = arn:aws:iam::218804696766:role/github-actions-deploy
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.CLUSTER_NAME }} \
            --region ${{ env.REGION }}

      # ── Apply ArgoCD AppProject first ───────────────────────────
      - name: Apply AppProject (platform)
        run: |
          kubectl apply -f argocd/projects/platform.yaml
          echo "✅ AppProject applied"

      # ── Apply the single umbrella Application ───────────────────
      - name: Apply root Application (App of Apps)
        run: |
          kubectl apply -f argocd/apps/root-app.yaml
          echo "✅ platform-root (App of Apps) applied"

      # ── Optional: force a hard-refresh on all apps ──────────────
      - name: Force ArgoCD sync (if requested)
        if: ${{ inputs.force_sync == true }}
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          curl -sSL -o argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          for app in platform-root ingress-nginx cert-manager metrics-server prometheus loki grafana promtail external-dns; do
            ./argocd app sync "$app" \
              --server "$ARGOCD_SERVER" \
              --auth-token "$ARGOCD_AUTH_TOKEN" \
              --insecure --force --prune || true
          done

      # ── Wait for root app to be Synced ───────────────────────────
      - name: Wait for root app sync
        run: |
          echo "⏳ Waiting for platform-root to sync child apps..."
          kubectl wait application/platform-root \
            -n ${{ env.ARGOCD_NS }} \
            --for=jsonpath='{.status.sync.status}'=Synced \
            --timeout=300s || true

      # ── Print status of all 9 apps ───────────────────────────────
      - name: Show all application statuses
        if: always()
        run: |
          echo ""
          echo "══════════════════════════════════════════════════"
          kubectl get applications -n ${{ env.ARGOCD_NS }} \
            -o custom-columns=\
          NAME:.metadata.name,\
          SYNC:.status.sync.status,\
          HEALTH:.status.health.status,\
          NAMESPACE:.spec.destination.namespace
          echo "══════════════════════════════════════════════════"
