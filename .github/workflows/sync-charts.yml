name: sync-charts

# ─────────────────────────────────────────────────────────────────────────────
# Release pipeline for the bundled "sinec-app" umbrella chart.
#
# Trigger:  push a tag like  release-1.0.4
#
# One job, sequential steps:
#   auth      → log in to AWS (OIDC)
#   discover  → find the latest chart version of each service in ECR
#   update    → write those versions into sinec-app/Chart.yaml (on the runner)
#   validate  → pull the charts + render the bundle (fail if not deployable)
#   publish   → commit + push the updated file to GitHub  ← ArgoCD auto-syncs
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "release-*"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  REGISTRY: 218804696766.dkr.ecr.us-east-1.amazonaws.com
  ROLE_ARN: arn:aws:iam::218804696766:role/github-actions-deploy
  SERVICES: "orders users payments"

permissions:
  contents: write     # to push the updated Chart.yaml
  id-token: write      # OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install tooling (yq + helm)
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      # ── auth ──────────────────────────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Helm login to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | helm registry login --username AWS --password-stdin "$REGISTRY"

      # ── discover + update ───────────────────────────────────────────────────
      - name: Resolve latest versions from ECR and update Chart.yaml
        run: |
          set -euo pipefail

          # Umbrella version from the release tag: release-1.0.4 → 1.0.4
          UMBRELLA="${GITHUB_REF_NAME#release-}"
          echo "UMBRELLA=$UMBRELLA" >> "$GITHUB_ENV"
          echo "::notice title=Umbrella version::$UMBRELLA"
          yq eval -i ".version = \"$UMBRELLA\"" sinec-app/Chart.yaml

          SUMMARY=""
          for svc in $SERVICES; do
            LATEST=$(aws ecr describe-images \
              --repository-name "charts/$svc" \
              --region "$AWS_REGION" \
              --query 'sort_by(imageDetails, &imagePushedAt)[-1].imageTags[0]' \
              --output text 2>/dev/null || echo "None")

            if [ -z "$LATEST" ] || [ "$LATEST" = "None" ]; then
              echo "::error title=Missing chart::No chart in ECR for '$svc'. Run the $svc release pipeline first."
              exit 1
            fi

            echo "::notice title=$svc::$LATEST"
            yq eval -i "(.dependencies[] | select(.name == \"$svc\") | .version) = \"$LATEST\"" sinec-app/Chart.yaml
            SUMMARY="$SUMMARY $svc=$LATEST"
          done

          echo "SUMMARY=$SUMMARY" >> "$GITHUB_ENV"
          echo "── Updated Chart.yaml ──"
          cat sinec-app/Chart.yaml

      # ── validate (precheck before it can reach the cluster) ─────────────────
      - name: Pull subcharts and render the bundle
        run: |
          set -euo pipefail
          helm dependency build sinec-app
          helm lint sinec-app
          helm template sinec-app > /dev/null
          echo "✅ Bundle builds, lints and renders cleanly"

      # ── publish (copy the updated file to GitHub → ArgoCD auto-syncs) ────────
      - name: Commit and push to main
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add sinec-app/Chart.yaml

          if git diff --cached --quiet; then
            echo "✓ Nothing changed — already at these versions"
            exit 0
          fi

          git commit -m "release $UMBRELLA —$SUMMARY"
          git push origin main
          echo "✅ Pushed to main — ArgoCD will auto-sync the cluster"
