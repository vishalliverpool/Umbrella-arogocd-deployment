name: sync-charts

# ─────────────────────────────────────────────────────────────────────────────
# Release pipeline — feeds the ArgoCD ApplicationSet.
#
# Trigger:  push a tag like  release-1.0.4  (or run manually)
#
# Steps:
#   1. auth-aws        → OIDC to AWS
#   2. ecr-credentials → Docker + Helm login to ECR
#   3. check-versions  → query ECR for latest chart version per service
#   4. update-config   → write version into services/<svc>/config.yaml
#   5. commit-config   → commit the tiny config files to main
#   6. verify          → print the release summary (last step — no git here)
#
# ArgoCD ApplicationSet watches services/*/config.yaml (git-files generator).
# It pulls Helm charts directly from ECR OCI using the version in config.yaml.
# No chart directories are stored in this repo — only the version config.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "release-*"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  REGISTRY: 218804696766.dkr.ecr.us-east-1.amazonaws.com
  ROLE_ARN: arn:aws:iam::218804696766:role/github-actions-deploy
  SERVICES: "orders users payments"

permissions:
  contents: write   # push config updates to main
  id-token: write   # OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Install yq
        run: |
          curl -sL https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64 \
            -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          yq --version

      # ── 1. Auth to AWS ─────────────────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 2. ECR Credentials (Docker + Helm) ─────────────────────────────────
      - name: Setup ECR credentials
        run: |
          ECR_TOKEN=$(aws ecr get-login-password --region "$AWS_REGION")

          # Helm login — used by ArgoCD OCI pulls and any local helm commands
          echo "$ECR_TOKEN" | helm registry login \
            --username AWS --password-stdin "$REGISTRY"

          # Docker login — used if the pipeline ever needs to inspect images
          echo "$ECR_TOKEN" | docker login \
            --username AWS --password-stdin "$REGISTRY"

          echo "ECR credentials configured for $REGISTRY"

      # ── 3. Check latest chart version per service in ECR ───────────────────
      - name: Check latest versions in ECR
        run: |
          set -euo pipefail
          SUMMARY=""
          for svc in $SERVICES; do
            LATEST=$(aws ecr describe-images \
              --repository-name "charts/$svc" \
              --region "$AWS_REGION" \
              --query 'sort_by(imageDetails, &imagePushedAt)[-1].imageTags[0]' \
              --output text 2>/dev/null || echo "None")

            if [ -z "$LATEST" ] || [ "$LATEST" = "None" ]; then
              echo "::error title=Missing chart::No chart in ECR for '$svc'. Run the $svc release pipeline first."
              exit 1
            fi
            echo "::notice title=$svc::Latest chart version = $LATEST"
            SUMMARY="$SUMMARY $svc=$LATEST"
          done
          echo "VERSIONS_SUMMARY=$SUMMARY" >> "$GITHUB_ENV"

      # ── 4. Update services/<svc>/config.yaml with the latest version ────────
      - name: Update version config files
        run: |
          set -euo pipefail
          for svc in $SERVICES; do
            LATEST=$(echo "$VERSIONS_SUMMARY" | grep -oP "(?<=$svc=)\S+")
            yq eval -i ".version = \"$LATEST\"" "services/$svc/config.yaml"
            echo "Updated services/$svc/config.yaml → version: $LATEST"
          done

      # ── 5. Commit updated config to main ────────────────────────────────────
      - name: Commit version config to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/*/config.yaml
          git diff --cached --quiet || git commit -m "release:$VERSIONS_SUMMARY"
          git push origin main

      # ── 6. Verify — summarise what was released (no git, no AWS calls) ──────
      - name: Verify release
        run: |
          echo "════════════════════════════════════════"
          echo "  Release complete"
          echo "════════════════════════════════════════"
          for svc in $SERVICES; do
            LATEST=$(echo "$VERSIONS_SUMMARY" | grep -oP "(?<=$svc=)\S+")
            echo "  $svc  →  $LATEST"
            echo "  ArgoCD will sync: oci://$REGISTRY/charts/$svc:$LATEST"
          done
          echo "════════════════════════════════════════"
          echo "ArgoCD ApplicationSet auto-detects the config change and deploys."
