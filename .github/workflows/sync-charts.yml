name: sync-charts

# Tag-triggered: push a tag (e.g., git tag release-1.0.0) to sync microservice charts from ECR
on:
  push:
    tags:
      - "release-*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: us-east-1
  REGISTRY: 218804696766.dkr.ecr.us-east-1.amazonaws.com

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::218804696766:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Query ECR for latest microservice chart versions
        run: |
          set -e

          # Derive umbrella chart version from the release tag (release-1.0.4 → 1.0.4)
          UMBRELLA_VERSION="${GITHUB_REF_NAME#release-}"
          echo "Umbrella chart version: $UMBRELLA_VERSION"

          echo "=========================================="
          echo "Finding latest charts in ECR for:"
          echo "  orders, users, payments"
          echo "=========================================="
          echo ""

          for svc in orders users payments; do
            echo "── $svc ──"

            LATEST=$(aws ecr describe-images \
              --repository-name "charts/$svc" \
              --region "$AWS_REGION" \
              --query 'sort_by(imageDetails, &imagePushedAt)[-1].imageTags[0]' \
              --output text 2>/dev/null || echo "")

            if [ -z "$LATEST" ] || [ "$LATEST" = "None" ]; then
              echo "  ⚠️  No charts found in ECR yet"
              LATEST="1.0.0"
            else
              echo "  ✅ Found: $LATEST"
            fi

            echo "  Updating sinec-app/Chart.yaml dependency '$svc' → $LATEST"
            yq eval -i "(.dependencies[] | select(.name == \"$svc\") | .version) = \"$LATEST\"" sinec-app/Chart.yaml
          done

          # Bump the umbrella chart version itself
          echo ""
          echo "Bumping umbrella chart version → $UMBRELLA_VERSION"
          yq eval -i ".version = \"$UMBRELLA_VERSION\"" sinec-app/Chart.yaml

          echo ""
          echo "=========================================="
          echo "Final sinec-app/Chart.yaml:"
          echo "=========================================="
          cat sinec-app/Chart.yaml

      - name: Commit and push to main (triggers ArgoCD sync)
        run: |
          git config user.name "chart-sync-bot"
          git config user.email "chart-sync-bot@users.noreply.github.com"

          git add sinec-app/Chart.yaml

          if git diff --cached --quiet; then
            echo "✓ No changes to commit"
            exit 0
          fi

          git commit -m "chore: sync microservice charts from ECR — orders, users, payments"
          git push origin main

          echo ""
          echo "✅ Pushed to main — ArgoCD will sync shortly"
