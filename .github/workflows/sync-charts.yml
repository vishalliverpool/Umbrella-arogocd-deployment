name: sync-charts

# ─────────────────────────────────────────────────────────────────────────────
# Deployment pipeline — triggered by service pipelines after pushing to ECR.
#
# Trigger:  repository_dispatch (event: chart-pushed) from a service pipeline
#           Payload: { "service": "payments", "version": "1.0.5" }
#           Also triggerable manually via workflow_dispatch.
#
# Steps:
#   1. resolve  → read service + version from dispatch payload or manual input
#   2. update   → write version into services/<svc>/config.yaml
#   3. commit   → commit the config change to main
#   4. verify   → print deploy summary
#
# ArgoCD ApplicationSet watches services/*/config.yaml (git-files generator).
# It pulls Helm charts directly from ECR OCI using the version in config.yaml.
# ─────────────────────────────────────────────────────────────────────────────

on:
  repository_dispatch:
    types: [chart-pushed]
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy (orders, users, payments)"
        required: true
      version:
        description: "Chart version to deploy"
        required: true

env:
  REGISTRY: 218804696766.dkr.ecr.us-east-1.amazonaws.com

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      # ── 1. Resolve service + version from payload or manual input ────────────
      - name: Resolve service and version
        run: |
          SERVICE="${{ github.event.client_payload.service || github.event.inputs.service }}"
          VERSION="${{ github.event.client_payload.version || github.event.inputs.version }}"
          if [ -z "$SERVICE" ] || [ -z "$VERSION" ]; then
            echo "::error::service and version are required"
            exit 1
          fi
          echo "SERVICE=$SERVICE" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Deploying $SERVICE @ $VERSION"

      # ── 2. Update services/<svc>/config.yaml ────────────────────────────────
      - name: Update version config
        run: |
          sed -i "s/version: .*/version: \"$VERSION\"/" "services/$SERVICE/config.yaml"
          echo "Updated services/$SERVICE/config.yaml → version: $VERSION"

      # ── 3. Commit to main ───────────────────────────────────────────────────
      - name: Commit version config to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "services/$SERVICE/config.yaml"
          git diff --cached --quiet || git commit -m "release: $SERVICE=$VERSION"
          git push origin main

      # ── 4. Verify ───────────────────────────────────────────────────────────
      - name: Verify
        run: |
          echo "════════════════════════════════════════"
          echo "  Release complete"
          echo "  $SERVICE → $VERSION"
          echo "  ArgoCD will sync: oci://$REGISTRY/charts/$SERVICE:$VERSION"
          echo "════════════════════════════════════════"
