name: sync-charts

# ─────────────────────────────────────────────────────────────────────────────
# Release pipeline — feeds the ArgoCD ApplicationSet.
#
# Trigger:  push a tag like  release-1.0.4
#
# One job, sequential steps:
#   auth      → log in to AWS (OIDC) + ECR
#   discover  → find the latest chart version of each service in ECR
#   pull      → fetch each chart from ECR and unpack it INTO the repo (services/<svc>)
#   validate  → render each chart locally (fail if broken)
#   publish   → commit + push the unpacked charts
#
# The ApplicationSet (argocd/applicationset.yaml) watches services/* and generates
# one ArgoCD app per folder. Pushing the charts here is what drives a deploy.
# ArgoCD apps point at git (services/<svc>) — never at ECR; ECR is used only here
# (to fetch the chart) and by the nodes (to pull images).
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "release-*"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  REGISTRY: 218804696766.dkr.ecr.us-east-1.amazonaws.com
  ROLE_ARN: arn:aws:iam::218804696766:role/github-actions-deploy
  SERVICES: "orders users payments"

permissions:
  contents: write     # to push the unpacked charts
  id-token: write      # OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      # ── auth ──────────────────────────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Helm login to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | helm registry login --username AWS --password-stdin "$REGISTRY"

      # ── discover + pull + validate ──────────────────────────────────────────
      - name: Pull latest charts from ECR into the repo
        run: |
          set -euo pipefail

          SUMMARY=""
          for svc in $SERVICES; do
            LATEST=$(aws ecr describe-images \
              --repository-name "charts/$svc" \
              --region "$AWS_REGION" \
              --query 'sort_by(imageDetails, &imagePushedAt)[-1].imageTags[0]' \
              --output text 2>/dev/null || echo "None")

            if [ -z "$LATEST" ] || [ "$LATEST" = "None" ]; then
              echo "::error title=Missing chart::No chart in ECR for '$svc'. Run the $svc release pipeline first."
              exit 1
            fi
            echo "::notice title=$svc::$LATEST"

            # Replace the committed chart with the freshly pulled one
            rm -rf "services/$svc"
            mkdir -p services
            helm pull "oci://$REGISTRY/charts/$svc" --version "$LATEST" --untar --untardir services

            # Render it — proves the chart is deployable before it is committed
            helm template "$svc" "services/$svc" > /dev/null

            SUMMARY="$SUMMARY $svc=$LATEST"
          done

          echo "SUMMARY=$SUMMARY" >> "$GITHUB_ENV"
          echo "✅ Charts pulled into repo and validated:$SUMMARY"

      # ── publish (no git commands — action commits & pushes for us) ───────────
      - name: Commit unpacked charts to main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "release —${{ env.SUMMARY }}"
          file_pattern: services/**
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          branch: main
