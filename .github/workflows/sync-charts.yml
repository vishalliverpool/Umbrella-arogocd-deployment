name: sync-charts

# Tag-triggered: push a tag (e.g., git tag release-1.0.0) to sync microservice charts from ECR
on:
  push:
    tags:
      - "release-*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: us-east-1
  REGISTRY: 218804696766.dkr.ecr.us-east-1.amazonaws.com

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::218804696766:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Query ECR for latest microservice chart versions
        run: |
          set -e

          echo "=========================================="
          echo "Finding latest charts in ECR for:"
          echo "  orders, users, payments"
          echo "=========================================="
          echo ""

          for svc in orders users payments; do
            echo "── $svc ──"

            # Get all image tags (chart versions) from ECR charts/ repo, sorted by push time
            LATEST=$(aws ecr describe-images \
              --repository-name "charts/$svc" \
              --region "$AWS_REGION" \
              --query 'sort_by(imageDetails, &imagePushedAt)[-1].imageTags[0]' \
              --output text 2>/dev/null || echo "")

            if [ -z "$LATEST" ] || [ "$LATEST" = "None" ]; then
              echo "  ⚠️  No charts found in ECR yet"
              LATEST="1.0.0"  # fallback to initial version
            else
              echo "  ✅ Found: $LATEST"
            fi

            # Bump the dependency version in the single bundled chart (sinec-app)
            echo "  Updating sinec-app/Chart.yaml dependency '$svc'..."
            yq eval -i "(.dependencies[] | select(.name == \"$svc\") | .version) = \"$LATEST\"" sinec-app/Chart.yaml
          done

          echo ""
          echo "=========================================="
          echo "Updated sinec-app/Chart.yaml dependencies:"
          echo "=========================================="
          yq eval '.dependencies' sinec-app/Chart.yaml

      - name: Commit and push to main (triggers ArgoCD sync)
        run: |
          git config user.name "chart-sync-bot"
          git config user.email "chart-sync-bot@users.noreply.github.com"

          git add sinec-app/Chart.yaml

          if git diff --cached --quiet; then
            echo "✓ No changes to commit"
            exit 0
          fi

          git commit -m "chore: sync microservice charts from ECR — orders, users, payments"
          git push origin main

          echo ""
          echo "✅ Pushed to main — ArgoCD will sync shortly"
