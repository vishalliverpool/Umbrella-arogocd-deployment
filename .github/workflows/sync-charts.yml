name: sync-charts

# ─────────────────────────────────────────────────────────────────────────────
# Triggered by a git tag (e.g. v1.0.5) created via GitHub Releases.
#
# Before tagging:
#   - Edit umbrella/Chart.yaml  → bump dependency versions
#   - Edit umbrella/values.yaml → update image tags
#   - Push to main
#   - Create release tag  v<version>  → this pipeline runs
#
# Steps:
#   1. auth-aws          → OIDC to AWS
#   2. ecr-login         → Helm login to ECR (needed for OCI sub-chart deps)
#   3. helm-dep-update   → resolve sub-chart dependencies from ECR OCI
#   4. argocd-sync       → trigger ArgoCD to deploy the updated umbrella chart
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "v*"

env:
  AWS_REGION: us-east-1
  REGISTRY: 218804696766.dkr.ecr.us-east-1.amazonaws.com
  ROLE_ARN: arn:aws:iam::218804696766:role/github-actions-deploy

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      # ── 1. Auth to AWS ─────────────────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 2. Helm login to ECR (for OCI sub-chart dependency resolution) ─────
      - name: Helm login to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
            helm registry login --username AWS --password-stdin "$REGISTRY"

      # ── 3. Resolve sub-chart dependencies from ECR OCI ─────────────────────
      - name: Helm dependency update
        run: helm dependency update umbrella/

      # ── 4. Trigger ArgoCD sync ─────────────────────────────────────────────
      - name: ArgoCD sync
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $ARGOCD_TOKEN" \
            -H "Content-Type: application/json" \
            https://$ARGOCD_SERVER/api/v1/applications/sinec-platform/sync \
            -d '{"prune":true}' | grep -q "^2" || { echo "ArgoCD sync failed"; exit 1; }
          echo "ArgoCD sync triggered for sinec-platform"
