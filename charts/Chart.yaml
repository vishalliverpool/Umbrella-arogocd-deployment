apiVersion: v2
name: platform
description: Platform infrastructure — all 8 components as Helm subcharts
type: application
version: 0.1.0
dependencies:
  - name: ingress-nginx
    version: 0.1.0
    repository: file://./ingress-nginx
    namespace: ingress-nginx
  - name: cert-manager
    version: 0.1.0
    repository: file://./cert-manager
    namespace: cert-manager
  - name: metrics-server
    version: 0.1.0
    repository: file://./metrics-server
    namespace: kube-system
  - name: prometheus
    version: 0.1.0
    repository: file://./prometheus
    namespace: monitoring
  - name: loki
    version: 0.1.0
    repository: file://./loki
    namespace: logging
  - name: grafana
    version: 0.1.0
    repository: file://./grafana
    namespace: monitoring
  - name: promtail
    version: 0.1.0
    repository: file://./promtail
    namespace: logging
  - name: external-dns
    version: 0.1.0
    repository: file://./external-dns
    namespace: kube-system
