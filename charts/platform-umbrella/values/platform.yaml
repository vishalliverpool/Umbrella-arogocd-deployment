# Single values file enabling all 8 components — deployed as one Helm release "paas"
# All resources land in the "platform" namespace.
# In ArgoCD UI: open "paas-app" → see all 8 components' resources inside.

ingress-nginx:
  enabled: true
  controller:
    replicaCount: 2
    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "external"
        service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

cert-manager:
  enabled: true
  installCRDs: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

metrics-server:
  enabled: true

prometheus:
  enabled: true
  prometheus:
    prometheusSpec:
      retention: 15d
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi

loki:
  enabled: true
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
  singleBinary:
    replicas: 1
  gateway:
    enabled: false
  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
    lokiCanary:
      enabled: false
  test:
    enabled: false

grafana:
  enabled: true
  replicas: 1
  adminUser: admin
  adminPassword: "cjbsOWbhOBpQSgTtgcjs"
  persistence:
    enabled: true
    storageClassName: gp2
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-operated.platform.svc.cluster.local:9090
          access: proxy
          isDefault: true
          jsonData:
            timeInterval: "30s"
        - name: Loki
          type: loki
          url: http://paas-loki.platform.svc.cluster.local:3100
          access: proxy
          jsonData:
            maxLines: 1000
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: platform
          orgId: 1
          folder: Platform
          type: file
          disableDeletion: true
          options:
            path: /var/lib/grafana/dashboards/platform
  dashboards:
    platform:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      nginx-ingress:
        gnetId: 9614
        revision: 1
        datasource: Prometheus
      cert-manager:
        gnetId: 11001
        revision: 1
        datasource: Prometheus
      loki-explorer:
        gnetId: 13639
        revision: 2
        datasource: Loki
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
  serviceMonitor:
    enabled: true

promtail:
  enabled: true
  config:
    logLevel: info
    serverPort: 3101
    clients:
      - url: http://paas-loki.platform.svc.cluster.local:3100/loki/api/v1/push
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  serviceMonitor:
    enabled: true

external-dns:
  enabled: true
  provider: aws
  aws:
    region: us-east-1
    zoneType: public
  policy: upsert-only
  registry: txt
  txtOwnerId: platform-cluster
  interval: 1m
  sources:
    - service
    - ingress
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::218804696766:role/platform-cluster-external-dns"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
