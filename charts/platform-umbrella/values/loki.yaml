## Deployed to namespace: logging
loki:
  enabled: true
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
  deploymentMode: SingleBinary
  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    persistence:
      enabled: true
      storageClass: gp2
      size: 20Gi
  monitoring:
    serviceMonitor:
      enabled: true
    selfMonitoring:
      enabled: false
    lokiCanary:
      enabled: false
  test:
    enabled: false

ingress-nginx:    { enabled: false }
cert-manager:     { enabled: false }
metrics-server:   { enabled: false }
prometheus:       { enabled: false }
grafana:          { enabled: false }
promtail:         { enabled: false }
external-dns:     { enabled: false }
