## ============================================================
## Platform Umbrella Chart — values.yaml
## All 8 sub-chart configs live here.
## Override per-environment via --set or a values-<env>.yaml.
## ============================================================

## ─────────────────────────────────────────────────────────────
## 1. INGRESS-NGINX
## ─────────────────────────────────────────────────────────────
ingress-nginx:
  controller:
    replicaCount: 2
    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "external"
        service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "10254"

## ─────────────────────────────────────────────────────────────
## 2. CERT-MANAGER
## ─────────────────────────────────────────────────────────────
cert-manager:
  crds:
    enabled: true        # installs CRDs automatically
  replicaCount: 2
  prometheus:
    enabled: true
    servicemonitor:
      enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

## ─────────────────────────────────────────────────────────────
## 3. METRICS-SERVER
## ─────────────────────────────────────────────────────────────
metrics-server:
  args:
    - --kubelet-preferred-address-types=InternalIP
    - --kubelet-insecure-tls    # Required on EKS unless using proper certs
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

## ─────────────────────────────────────────────────────────────
## 4. PROMETHEUS  (alias for kube-prometheus-stack)
## ─────────────────────────────────────────────────────────────
prometheus:
  grafana:
    enabled: false          # Using standalone Grafana below

  prometheus:
    prometheusSpec:
      retention: 15d
      retentionSize: "40GB"
      resources:
        requests:
          cpu: 200m
          memory: 1Gi
        limits:
          cpu: 1000m
          memory: 2Gi
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp2
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      serviceMonitorSelectorNilUsesHelmValues: false   # scrape all ServiceMonitors

  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi

  prometheusOperator:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

## ─────────────────────────────────────────────────────────────
## 5. LOKI
## ─────────────────────────────────────────────────────────────
loki:
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem

  deploymentMode: SingleBinary

  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    persistence:
      enabled: true
      storageClass: gp2
      size: 20Gi

  monitoring:
    serviceMonitor:
      enabled: true
    selfMonitoring:
      enabled: false       # Avoids circular dependency with Grafana Agent
    lokiCanary:
      enabled: false

  test:
    enabled: false

## ─────────────────────────────────────────────────────────────
## 6. GRAFANA
## ─────────────────────────────────────────────────────────────
grafana:
  replicas: 1

  adminUser: admin
  # adminPassword is intentionally left blank — set via:
  #   --set grafana.adminPassword=<your-password>
  # or reference a K8s secret (see grafana.admin.existingSecret)
  adminPassword: "cjbsOWbhOBpQSgTtgcjs"

  persistence:
    enabled: true
    storageClassName: gp2
    size: 10Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  ## Pre-configure Prometheus + Loki datasources
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-operated:9090   # Created by prometheus-operator
          access: proxy
          isDefault: true
          jsonData:
            timeInterval: "30s"

        - name: Loki
          type: loki
          url: http://{{ .Release.Name }}-loki:3100
          access: proxy
          jsonData:
            maxLines: 1000

  ## Pre-load curated dashboards from Grafana.com
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: platform
          orgId: 1
          folder: Platform
          type: file
          disableDeletion: true
          editable: false
          options:
            path: /var/lib/grafana/dashboards/platform

  dashboards:
    platform:
      kubernetes-cluster-overview:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      nginx-ingress-controller:
        gnetId: 9614
        revision: 1
        datasource: Prometheus
      cert-manager:
        gnetId: 11001
        revision: 1
        datasource: Prometheus
      loki-logs-explorer:
        gnetId: 13639
        revision: 2
        datasource: Loki
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      kubernetes-pods:
        gnetId: 6336
        revision: 1
        datasource: Prometheus

  ## Expose via ingress-nginx (requires ingress-nginx deployed first)
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod   # after ClusterIssuer created
    hosts:
      - grafana.platform-cluster.local   # Update once you have a Route53 zone
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.platform-cluster.local

  ## Wire Grafana's own metrics into Prometheus
  serviceMonitor:
    enabled: true

## ─────────────────────────────────────────────────────────────
## 7. PROMTAIL  (log shipper → Loki)
## ─────────────────────────────────────────────────────────────
promtail:
  config:
    logLevel: info
    serverPort: 3101
    clients:
      - url: http://{{ .Release.Name }}-loki:3100/loki/api/v1/push

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  serviceMonitor:
    enabled: true

## ─────────────────────────────────────────────────────────────
## 8. EXTERNAL-DNS  (Route53 automation)
## ─────────────────────────────────────────────────────────────
external-dns:
  provider: aws
  aws:
    region: us-east-1
    zoneType: public
  policy: upsert-only          # Never deletes DNS records
  registry: txt
  txtOwnerId: platform-cluster
  interval: 1m
  sources:
    - service
    - ingress

  ## IRSA — annotate the ServiceAccount with the IAM role ARN
  ## Create the role first with: make create-external-dns-role
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::218804696766:role/platform-cluster-external-dns"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
