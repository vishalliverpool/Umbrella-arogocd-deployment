apiVersion: v2
name: platform-umbrella
description: |
  Platform infrastructure umbrella chart.
  Manages 8 components as a single ArgoCD Application:
    1. ingress-nginx       — cluster ingress controller
    2. cert-manager        — TLS certificate automation
    3. kube-prometheus-stack — Prometheus + AlertManager
    4. grafana             — dashboards (Prometheus + Loki datasources pre-wired)
    5. loki                — log aggregation
    6. promtail            — log shipper (DaemonSet)
    7. external-dns        — Route53 DNS automation
    8. metrics-server      — HPA / kubectl top support
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  # Wave 1 — foundational, no dependencies on each other
  - name: ingress-nginx
    version: "4.10.1"
    repository: https://kubernetes.github.io/ingress-nginx

  - name: cert-manager
    version: "v1.14.5"
    repository: https://charts.jetstack.io

  - name: metrics-server
    version: "3.12.1"
    repository: https://kubernetes-sigs.github.io/metrics-server/

  # Wave 2 — observability back-ends
  - name: kube-prometheus-stack
    version: "58.5.3"
    repository: https://prometheus-community.github.io/helm-charts
    alias: prometheus

  - name: loki
    version: "5.47.2"
    repository: https://grafana.github.io/helm-charts

  # Wave 3 — depends on wave-2 back-ends being up
  - name: grafana
    version: "7.3.11"
    repository: https://grafana.github.io/helm-charts

  - name: promtail
    version: "6.15.5"
    repository: https://grafana.github.io/helm-charts

  # Wave 4 — DNS / routing layer
  - name: external-dns
    version: "1.14.5"
    repository: https://kubernetes-sigs.github.io/external-dns/
