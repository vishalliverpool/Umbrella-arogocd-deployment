apiVersion: v2
name: platform-umbrella
description: Platform infrastructure umbrella chart — all 8 components as subcharts
type: application
version: 0.1.0
dependencies:
  - name: ingress-nginx
    version: 0.1.0
    repository: file://./charts/ingress-nginx
    namespace: ingress-nginx
  - name: cert-manager
    version: 0.1.0
    repository: file://./charts/cert-manager
    namespace: cert-manager
  - name: metrics-server
    version: 0.1.0
    repository: file://./charts/metrics-server
    namespace: kube-system
  - name: prometheus
    version: 0.1.0
    repository: file://./charts/prometheus
    namespace: monitoring
  - name: loki
    version: 0.1.0
    repository: file://./charts/loki
    namespace: logging
  - name: grafana
    version: 0.1.0
    repository: file://./charts/grafana
    namespace: monitoring
  - name: promtail
    version: 0.1.0
    repository: file://./charts/promtail
    namespace: logging
  - name: external-dns
    version: 0.1.0
    repository: file://./charts/external-dns
    namespace: kube-system
