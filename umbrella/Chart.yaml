apiVersion: v2
name: platform-release
description: Umbrella chart for sinec-app services
type: application
# version (chart) + appVersion (release tag) — appVersion must match the pushed
# tag (validate job). Sub-charts are pulled from ECR (OCI), pushed there by each
# service's own release pipeline.
version: 1.0.0
appVersion: "v1.0.0"
dependencies:
  - name: orders
    version: "0.1.0"
    repository: "oci://218804696766.dkr.ecr.us-east-1.amazonaws.com/charts"
  - name: users
    version: "0.1.0"
    repository: "oci://218804696766.dkr.ecr.us-east-1.amazonaws.com/charts"
  - name: payments
    version: "0.1.0"
    repository: "oci://218804696766.dkr.ecr.us-east-1.amazonaws.com/charts"
